version: "3.9"

services:
  shopmind:
    build: .
    container_name: shopmind-ai
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
